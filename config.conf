print_info() {
    prin " "
    prin "${c1} 🚀 Sistema"
    info "${c5} ├─ 🐧 OS" distro
    info "${c5} ├─ ⚙️ Kernel" kernel
    info "${c5} ├─ 📦 Paquetes" packages
    info "${c5} └─ ⏱️ Uptime" uptime
    prin " "
    prin "${c1} 💻 Entorno"
    info "${c5} ├─ 👾 Shell" shell
    info "${c5} ├─ 🧠 CPU" cpu
    info "${c5} ├─ ⚙️ Tareas" procs
    info "${c5} └─ 🌐 IP" local_ip
    prin " "
    prin "    $(color 1)⬤ $(color 2)⬤ $(color 3)⬤ $(color 4)⬤ $(color 5)⬤ $(color 6)⬤"
}

whoami=$(whoami)
kernel_shorthand="on"
distro_shorthand="off"
os_arch="off"
uptime_shorthand="on"
package_managers="tiny"
shell_path="off"
shell_version="on"
cpu_brand="on"
cpu_speed="off"
cpu_cores="off"
cpu_temp="off"
local_ip_interface=('auto')
colors=(distro)
bold="on"
underline_enabled="on"
underline_char="─"
separator=" "
block_range=(0 7)
color_blocks="off"
block_width=3
block_height=1
col_offset="auto"
image_backend="ascii"
image_source="${HOME}/.config/neofetch/ascii.txt"
ascii_distro="arch_small"
ascii_colors=(distro)
ascii_bold="on"
image_loop="off"
thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
crop_mode="normal"
crop_offset="center"
image_size="auto"
gap=5
yoffset=0
xoffset=0
background_color=
stdout="off"
